name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ["1.26"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Vet
        run: go vet ./...

      - name: Test (unit + golden snapshots)
        run: go test ./... -v -count=1

      - name: Build
        run: go build -o mash .
